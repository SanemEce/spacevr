<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SPACE VR</title>
    <meta name="description" content="360&deg; Image Gallery - A-Frame" />
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.x.x/dist/aframe-event-set-component.min.js"></script>

    <script>
      AFRAME.registerComponent('billboard', {
        init: function () {
          this.cameraWorldPosition = new THREE.Vector3();
        },

        tick: function () {
          const camera = this.el.sceneEl && this.el.sceneEl.camera;
          if (!camera) return;

          camera.getWorldPosition(this.cameraWorldPosition);
          this.el.object3D.lookAt(this.cameraWorldPosition);
        },
      });

      AFRAME.registerComponent('show-on-default-sky', {
        schema: {
          defaultSky: { type: 'selector' },
        },

        init: function () {
          this.skyEl = document.querySelector('#image-360');
          this.updateVisibility = this.updateVisibility.bind(this);

          if (!this.skyEl || !this.data.defaultSky) return;

          this.el.sceneEl.addEventListener('loaded', this.updateVisibility);
          this.skyEl.addEventListener('componentchanged', this.updateVisibility);
          this.skyEl.addEventListener('materialtextureloaded', this.updateVisibility);

          this.updateVisibility();
        },

        updateVisibility: function (evt) {
          if (
            evt &&
            evt.detail &&
            evt.detail.name &&
            evt.detail.name !== 'material'
          ) {
            return;
          }
          if (!this.skyEl || !this.data.defaultSky) return;

          const skyMat =
            this.skyEl.getObject3D('mesh') &&
            this.skyEl.getObject3D('mesh').material;
          const currentImage = skyMat && skyMat.map && skyMat.map.image;
          const defaultImage = this.data.defaultSky;
          const isDefault = currentImage === defaultImage;

          this.el.setAttribute('visible', isDefault);

          if (isDefault) {
            this.el.classList.add('clickable');
          } else {
            this.el.classList.remove('clickable');
          }
        },
      });

      AFRAME.registerComponent('hide-on-default-sky', {
        schema: {
          defaultSky: { type: 'selector' },
        },

        init: function () {
          this.skyEl = document.querySelector('#image-360');
          this.updateVisibility = this.updateVisibility.bind(this);

          if (!this.skyEl || !this.data.defaultSky) return;

          this.el.sceneEl.addEventListener('loaded', this.updateVisibility);
          this.skyEl.addEventListener('componentchanged', this.updateVisibility);
          this.skyEl.addEventListener('materialtextureloaded', this.updateVisibility);

          this.updateVisibility();
        },

        updateVisibility: function (evt) {
          if (
            evt &&
            evt.detail &&
            evt.detail.name &&
            evt.detail.name !== 'material'
          ) {
            return;
          }
          if (!this.skyEl || !this.data.defaultSky) return;

          const skyMat =
            this.skyEl.getObject3D('mesh') &&
            this.skyEl.getObject3D('mesh').material;
          const currentImage = skyMat && skyMat.map && skyMat.map.image;
          const defaultImage = this.data.defaultSky;
          const isDefault = currentImage === defaultImage;

          this.el.setAttribute('visible', !isDefault);

          if (!isDefault) {
            this.el.classList.add('clickable');
          } else {
            this.el.classList.remove('clickable');
          }
        },
      });

      AFRAME.registerComponent('switch-sky-on-click', {
        schema: {
          target: { type: 'selector' },
          src: { type: 'selector' },
        },

        init: function () {
          this.onClick = this.onClick.bind(this);
          this.el.addEventListener('click', this.onClick);
        },

        onClick: function () {
          if (!this.data.target || !this.data.src) return;

          const rig = document.querySelector('#rig');
          const cameraRig = document.querySelector('#cameraRig');

          if (rig) {
            rig.object3D.position.set(0, 0, 0);
            rig.object3D.rotation.set(0, 0, 0);
          }

          if (cameraRig) {
            cameraRig.object3D.position.set(0, 1.6, 0);
          }

          this.data.target.emit('fade');
          this.data.target.setAttribute('src', '#' + this.data.src.id);
        },

        remove: function () {
          this.el.removeEventListener('click', this.onClick);
        },
      });

      AFRAME.registerComponent('strict-switch-sky-on-click', {
        schema: {
          target: { type: 'selector' },
          src: { type: 'selector' },
        },

        init: function () {
          this.onClick = this.onClick.bind(this);
          this.el.addEventListener('click', this.onClick);
        },

        onClick: function (evt) {
          if (!this.data.target || !this.data.src) return;

          const cursorEl = evt.detail && evt.detail.cursorEl;
          if (!cursorEl) return;

          const raycaster = cursorEl.components && cursorEl.components.raycaster;
          if (!raycaster || !raycaster.intersectedEls || !raycaster.intersectedEls.length) return;

          if (raycaster.intersectedEls[0] !== this.el) return;

          const rig = document.querySelector('#rig');
          const cameraRig = document.querySelector('#cameraRig');

          if (rig) {
            rig.object3D.position.set(0, 0, 0);
            rig.object3D.rotation.set(0, 0, 0);
          }

          if (cameraRig) {
            cameraRig.object3D.position.set(0, 1.6, 0);
          }

          this.data.target.emit('fade');
          this.data.target.setAttribute('src', '#' + this.data.src.id);
        },

        remove: function () {
          this.el.removeEventListener('click', this.onClick);
        },
      });

      AFRAME.registerComponent('thumbstick-locomotion', {
        schema: {
          speed: { default: 0.12 },
          deadZone: { default: 0.2 },
        },

        init: function () {
          this.direction = new THREE.Vector3();
          this.forward = new THREE.Vector3();
          this.right = new THREE.Vector3();
          this.up = new THREE.Vector3(0, 1, 0);
          this.inputX = 0;
          this.inputY = 0;
          this.onThumbstickMoved = this.onThumbstickMoved.bind(this);
          this.onThumbstickEnded = this.onThumbstickEnded.bind(this);

          this.el.addEventListener('thumbstickmoved', this.onThumbstickMoved);
          this.el.addEventListener('thumbstickend', this.onThumbstickEnded);
        },

        onThumbstickMoved: function (evt) {
          this.inputX = evt.detail.x;
          this.inputY = evt.detail.y;
        },

        onThumbstickEnded: function () {
          this.inputX = 0;
          this.inputY = 0;
        },

        tick: function () {
          const rig = document.querySelector('#rig');
          const camera = document.querySelector('[camera]');
          if (!rig || !camera) return;

          let x = this.inputX;
          let y = this.inputY;

          if (Math.abs(x) < this.data.deadZone) x = 0;
          if (Math.abs(y) < this.data.deadZone) y = 0;

          if (x === 0 && y === 0) return;

          camera.object3D.getWorldDirection(this.forward);
          this.forward.y = 0;

          if (this.forward.lengthSq() === 0) return;
          this.forward.normalize();

          this.right.crossVectors(this.up, this.forward).normalize();

          this.direction.set(0, 0, 0);
          this.direction.addScaledVector(this.forward, y);
          this.direction.addScaledVector(this.right, x);

          if (this.direction.lengthSq() > 0) {
            this.direction.normalize().multiplyScalar(this.data.speed);
            rig.object3D.position.add(this.direction);
          }
        },

        remove: function () {
          this.el.removeEventListener('thumbstickmoved', this.onThumbstickMoved);
          this.el.removeEventListener('thumbstickend', this.onThumbstickEnded);
        },
      });

      AFRAME.registerComponent('desktop-cursor-toggle', {
        init: function () {
          this.sceneEl = this.el.sceneEl;
          this.onEnterVR = this.onEnterVR.bind(this);
          this.onExitVR = this.onExitVR.bind(this);

          this.sceneEl.addEventListener('enter-vr', this.onEnterVR);
          this.sceneEl.addEventListener('exit-vr', this.onExitVR);
        },

        onEnterVR: function () {
          this.el.setAttribute('visible', false);
          this.el.setAttribute('raycaster', 'enabled', true);
        },

        onExitVR: function () {
          this.el.setAttribute('visible', false);
          this.el.setAttribute('raycaster', 'enabled', true);
        },

        remove: function () {
          this.sceneEl.removeEventListener('enter-vr', this.onEnterVR);
          this.sceneEl.removeEventListener('exit-vr', this.onExitVR);
        },
      });

      AFRAME.registerComponent('snap-turn', {
        schema: {
          angle: { default: 30 },
          threshold: { default: 0.75 },
        },

        init: function () {
          this.canTurn = true;
          this.onThumbstickMoved = this.onThumbstickMoved.bind(this);
          this.el.addEventListener('thumbstickmoved', this.onThumbstickMoved);
        },

        onThumbstickMoved: function (evt) {
          const rig = document.querySelector('#rig');
          if (!rig) return;

          const x = evt.detail.x;

          if (Math.abs(x) < this.data.threshold) {
            this.canTurn = true;
            return;
          }

          if (!this.canTurn) return;

          const turnAmount = x > 0 ? -this.data.angle : this.data.angle;
          rig.object3D.rotation.y += THREE.MathUtils.degToRad(turnAmount);
          this.canTurn = false;
        },

        remove: function () {
          this.el.removeEventListener('thumbstickmoved', this.onThumbstickMoved);
        },
      });

      AFRAME.registerComponent('radial-ring-texture', {
        schema: {
          innerRadius: { default: 1.2 },
          outerRadius: { default: 2.6 },
        },

        init: function () {
          this.applyUVs = this.applyUVs.bind(this);
          this.el.addEventListener('loaded', this.applyUVs);
          this.el.addEventListener('object3dset', this.applyUVs);
          this.el.addEventListener('materialtextureloaded', this.applyUVs);
          this.applyUVs();
        },

        applyUVs: function () {
          const mesh = this.el.getObject3D('mesh');
          if (!mesh || !mesh.geometry) return;

          const geometry = mesh.geometry;
          const positions = geometry.attributes.position;
          const uvs = geometry.attributes.uv;
          if (!positions || !uvs) return;

          const inner = this.data.innerRadius;
          const outer = this.data.outerRadius;
          const radiusRange = outer - inner;
          if (radiusRange <= 0) return;

          for (let i = 0; i < positions.count; i++) {
            const x = positions.getX(i);
            const y = positions.getY(i);
            const angle = (Math.atan2(y, x) + Math.PI) / (Math.PI * 2);
            const radius = Math.sqrt(x * x + y * y);
            const radial = THREE.MathUtils.clamp((radius - inner) / radiusRange, 0, 1);

            uvs.setXY(i, radial, angle);
          }

          uvs.needsUpdate = true;

          if (mesh.material && mesh.material.map) {
            mesh.material.map.wrapS = THREE.ClampToEdgeWrapping;
            mesh.material.map.wrapT = THREE.RepeatWrapping;
            mesh.material.map.needsUpdate = true;
          }
        },

        update: function () {
          this.applyUVs();
        },

        remove: function () {
          this.el.removeEventListener('loaded', this.applyUVs);
          this.el.removeEventListener('object3dset', this.applyUVs);
          this.el.removeEventListener('materialtextureloaded', this.applyUVs);
        },
      });

      AFRAME.registerComponent('place-in-front-on-show', {
        schema: {
          distance: { default: 3 },
        },

        init: function () {
          this.wasVisible = this.el.getAttribute('visible');
          this.cameraPos = new THREE.Vector3();
          this.forward = new THREE.Vector3();
          this.newPos = new THREE.Vector3();
        },

        tick: function () {
          const isVisible = this.el.getAttribute('visible');

          if (!this.wasVisible && isVisible) {
            const camera = this.el.sceneEl && this.el.sceneEl.camera;
            if (!camera) return;

            camera.getWorldPosition(this.cameraPos);
            camera.getWorldDirection(this.forward);
            this.forward.normalize();

            this.newPos.copy(this.cameraPos);
            this.newPos.addScaledVector(this.forward, this.data.distance);
            this.newPos.y = -1;

            this.el.object3D.position.copy(this.newPos);
          }

          this.wasVisible = isVisible;
        },
      });

      AFRAME.registerComponent('place-right-on-show', {
        schema: {
          forwardDistance: { default: 1.4 },
          rightDistance: { default: 1.6 },
          yOffset: { default: 0 },
        },

        init: function () {
          this.wasVisible = this.el.getAttribute('visible');
          this.cameraPos = new THREE.Vector3();
          this.forward = new THREE.Vector3();
          this.right = new THREE.Vector3();
          this.up = new THREE.Vector3(0, 1, 0);
          this.newPos = new THREE.Vector3();
        },

        tick: function () {
          const isVisible = this.el.getAttribute('visible');

          if (!this.wasVisible && isVisible) {
            const camera = this.el.sceneEl && this.el.sceneEl.camera;
            if (!camera) return;

            camera.getWorldPosition(this.cameraPos);
            camera.getWorldDirection(this.forward);
            this.forward.y = 0;
            if (this.forward.lengthSq() === 0) return;
            this.forward.normalize();

            this.right.crossVectors(this.up, this.forward).normalize();

            this.newPos.copy(this.cameraPos);
            this.newPos.addScaledVector(this.forward, this.data.forwardDistance);
            this.newPos.addScaledVector(this.right, this.data.rightDistance);
            this.newPos.y = this.cameraPos.y + this.data.yOffset;

            this.el.object3D.position.copy(this.newPos);
          }

          this.wasVisible = isVisible;
        },
      });

      AFRAME.registerComponent('sky-info-panel', {
        init: function () {
          this.skyEl = document.querySelector('#image-360');
          this.textEl = this.el.querySelector('.info-text');
          this.returnThumbEl = document.querySelector('#space-return-thumb');
          this.updateInfo = this.updateInfo.bind(this);

          this.infoMap = {
            mercurySurface: {
              title: 'Mercury',
              body: 'Mercury is the closest planet to the Sun and has a rocky surface full of impact craters.'
            },
            venusSurface: {
              title: 'Venus',
              body: 'Venus has a dense atmosphere and an extremely hot surface hidden beneath thick clouds.'
            },
            earthSurface: {
              title: 'Earth',
              body: 'Earth is the only known planet with stable liquid water oceans and life.'
            },
            marsSurface: {
              title: 'Mars',
              body: 'Mars is the red planet, known for dusty plains, giant volcanoes, and polar ice caps.'
            },
            jupiterSurface: {
              title: 'Jupiter',
              body: 'Jupiter is the largest planet in the Solar System, a gas giant famous for its bands and giant storms.'
            },
            saturnSurface: {
              title: 'Saturn',
              body: 'Saturn is a gas giant best known for its bright ring system and its low overall density.'
            },
            marsSurface: {
              title: 'Mars',
              body: 'Mars is the red planet, known for dusty plains, giant volcanoes, and polar ice caps.'
            },
            uranusSurface: {
              title: 'Uranus',
              body: 'Uranus is an ice giant with a blue-green atmosphere and a dramatic axial tilt.'
            },
            neptuneSurface: {
              title: 'Neptune',
              body: 'Neptune is a distant ice giant with powerful winds and a deep blue atmosphere.'
            }
          };

          if (!this.skyEl || !this.textEl) return;

          this.el.sceneEl.addEventListener('loaded', this.updateInfo);
          this.skyEl.addEventListener('componentchanged', this.updateInfo);
          this.skyEl.addEventListener('materialtextureloaded', this.updateInfo);

          this.updateInfo();
        },

        updateInfo: function (evt) {
          if (evt && evt.detail && evt.detail.name && evt.detail.name !== 'material') {
            return;
          }
          if (!this.skyEl || !this.textEl) return;

          const skyMat =
            this.skyEl.getObject3D('mesh') &&
            this.skyEl.getObject3D('mesh').material;
          const currentImage = skyMat && skyMat.map && skyMat.map.image;

          if (!currentImage || !currentImage.currentSrc) {
            this.el.setAttribute('visible', false);
            if (this.returnThumbEl) this.returnThumbEl.setAttribute('visible', false);
            return;
          }

          const currentSrc = currentImage.currentSrc;
          const defaultSky = document.querySelector('#space');
          if (defaultSky && defaultSky.currentSrc === currentSrc) {
            this.el.setAttribute('visible', false);
            if (this.returnThumbEl) this.returnThumbEl.setAttribute('visible', false);
            return;
          }

          let matched = null;
          for (const key in this.infoMap) {
            const asset = document.querySelector('#' + key);
            if (asset && asset.currentSrc === currentSrc) {
              matched = this.infoMap[key];
              break;
            }
          }

          if (!matched) {
            this.el.setAttribute('visible', false);
            if (this.returnThumbEl) this.returnThumbEl.setAttribute('visible', false);
            return;
          }

          this.textEl.setAttribute('text', 'value', matched.title + '\n\n' + matched.body);
          this.el.setAttribute('visible', true);
          if (this.returnThumbEl) this.returnThumbEl.setAttribute('visible', true);
        },
      });
    </script>
  </head>

            radius="1"
            src="#saturnTexture"
            event-set__mouseenter="scale: 1.15 1.15 1.15"
            event-set__mouseleave="scale: 1 1 1"
            strict-switch-sky-on-click="target: #image-360; src: #saturnSurface"
          ></a-sphere>

          <a-ring
            id="saturn-ring"
            rotation="-90 0 0"
            segments-theta="128"
            segments-phi="8"
            radius-inner="1.2"
            radius-outer="2.6"
            radial-ring-texture="innerRadius: 1.2; outerRadius: 2.6"
            material="src: #saturnRingTexture; transparent: true; alphaTest: 0.05; side: double; shader: flat"
          ></a-ring>
        </a-entity>
      </a-entity>

      <a-sphere
        id="uranus"
        class="clickable"
        show-on-default-sky="defaultSky: #space"
        position="-8 0 0"
        radius="1"
        src="#uranusTexture"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 13000; easing: linear"
        event-set__mouseenter="scale: 1.15 1.15 1.15"
        event-set__mouseleave="scale: 1 1 1"
        strict-switch-sky-on-click="target: #image-360; src: #uranusSurface"
      ></a-sphere>

      <a-sphere
        id="neptune"
        class="clickable"
        show-on-default-sky="defaultSky: #space"
        position="-5.66 0 -5.66"
        radius="1"
        src="#neptuneTexture"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 14000; easing: linear"
        event-set__mouseenter="scale: 1.15 1.15 1.15"
        event-set__mouseleave="scale: 1 1 1"
        strict-switch-sky-on-click="target: #image-360; src: #neptuneSurface"
      ></a-sphere>

      <a-sky
        id="image-360"
        radius="100"
        src="#space"
        animation__fade="property: components.material.material.color; type: color; from: #FFF; to: #000; dur: 300; startEvents: fade"
        animation__fadeback="property: components.material.material.color; type: color; from: #000; to: #FFF; dur: 300; startEvents: animationcomplete__fade"
      ></a-sky>

      <a-entity
        id="planet-ui-group"
        position="0 0 -2.5"
        visible="false"
        billboard
        place-right-on-show="forwardDistance: 1.4; rightDistance: 1.6; yOffset: 0"
        sky-info-panel
      >
        <a-entity
          id="planet-info-panel"
          position="0 0 0"
        >
          <a-plane
            class="info-bg"
            width="2.6"
            height="1.35"
            color="#111"
            material="opacity: 0.85; transparent: true; side: double"
          ></a-plane>

          <a-entity
            class="info-text"
            position="0 0 0.01"
            text="value: ; align: center; color: white; width: 2.2; wrapCount: 28"
          ></a-entity>
        </a-entity>

        <a-entity
          id="space-return-thumb"
          class="clickable"
          position="0 -1.1 0.01"
          scale="1 1 1"
          geometry="primitive: plane; width: 1.5; height: 1"
          material="shader: flat; src: #space-thumb; transparent: true; alphaTest: 0.5; side: double"
          sound="on: click; src: #click-sound"
          visible="false"
          event-set__mouseenter="scale: 1.5 1.5 1.5"
          event-set__mouseleave="scale: 1 1 1"
          switch-sky-on-click="target: #image-360; src: #space"
        ></a-entity>
      </a-entity>
      </a-entity>

      <a-entity id="rig" position="0 0 0">
        <a-entity
          id="cameraRig"
          camera
          look-controls
          wasd-controls="fly: true"
          position="0 1.6 0"
        >
          <a-cursor
            id="cursor"
            desktop-cursor-toggle
            cursor="rayOrigin: mouse"
            raycaster="objects: .clickable"
            visible="false"
          ></a-cursor>
        </a-entity>

        <a-entity
          id="leftHand"
          meta-touch-controls="hand: left; model: true"
          laser-controls="hand: left"
          raycaster="objects: .clickable"
          line="color: white; opacity: 0.75"
          thumbstick-locomotion="speed: 0.12"
        ></a-entity>

        <a-entity
          id="rightHand"
          meta-touch-controls="hand: right; model: true"
          laser-controls="hand: right"
          raycaster="objects: .clickable"
          line="color: white; opacity: 0.75"
          snap-turn="angle: 30; threshold: 0.75"
        ></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
